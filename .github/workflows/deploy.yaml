name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy-selfhosted:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          sudo mkdir -p /home/svc_devdog/Danvers-Gateway
          sudo cp -r . /home/svc_devdog/Danvers-Gateway
          sudo chown -R svc_devdog:svc_devdog /home/svc_devdog/Danvers-Gateway
          sudo -u svc_devdog bash -c '
          cd /home/svc_devdog/Danvers-Gateway &&
          go build -buildvcs=false -o DanversGateway .
          '
      - name: Install
        run: |
          if systemctl list-units --type=service --all | grep -q "gateway.service"; then
            sudo systemctl stop gateway.service
          fi
          sudo cp gateway.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable gateway.service
          sudo systemctl start gateway.service
          sudo systemctl status gateway.service
      - name: Show logs if build fails
        if: failure()
        run: |
          echo "Build failed"
          ls -la
          sudo journalctl -u gateway.service -n 10